name: ZenPro2026 Signal Engine

on:
  schedule:
    - cron: "*/5 3-9 * * 1-5"
  workflow_dispatch:

jobs:
  run-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas numpy pytz

      - name: Run signal engine
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python signal_engine.py

      - name: Save cooldown state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cooldown-state
          path: cooldown_state.json
          if-no-files-found: ignore
